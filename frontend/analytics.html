<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Detection System</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .analytics-content {
            padding: 20px;
            width: 100%;
        }

        .report-box {
            background-color: var(--dark-bg);
            padding: 30px;
            border: 1px solid var(--silver-border);
            max-width: 500px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="sidebar" id="sidebar">
        <h2>Navigation</h2>
        <button onclick="window.location.href='/'">Dashboard</button>
        <button onclick="window.location.href='archive.html'">Archive</button>
        <button onclick="window.location.href='trash.html'">Trash</button>
    </div>

    <div class="analytics-content">
        <div class="top-bar">
            <div class="top-bar-left">
                <button class="toggle-btn" onclick="document.getElementById('sidebar').classList.toggle('collapsed')"
                    title="Toggle Menu">
                    &#9776;
                </button>
                <div class="header">
                    <h1>ANALYTICS & REPORTS</h1>
                </div>
            </div>
        </div>

        <div class="report-box">
            <h3>Generate PDF Report</h3>
            <p>Select parameters to generate an incident report.</p>

            <input type="date" id="start-date" placeholder="Start Date">
            <input type="date" id="end-date" placeholder="End Date">
            <select id="cam-filter">
                <option value="">All Cameras</option>
            </select>
            <button id="download-btn">DOWNLOAD PDF</button>
        </div>
    </div>

    <script src="analytics.js"></script>
</body>

</html>
